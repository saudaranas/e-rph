<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-RPH Prasekolah</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1a5c36;
  --green-mid: #2d7a4f;
  --green-light: #e8f5ee;
  --green-xlight: #f4fbf7;
  --blue: #1a3c6e;
  --amber: #b85c00;
  --red: #b71c1c;
  --gray-900: #111;
  --gray-700: #333;
  --gray-500: #666;
  --gray-300: #bbb;
  --border: #9dc4ad;
  --white: #fff;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --radius: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #eaf2ed; min-height: 100vh; font-size: 13px; color: var(--gray-900); }

/* TOPBAR */
.topbar { background: var(--green); color: white; padding: 0 18px; height: 50px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
.tb-brand { display: flex; align-items: center; gap: 10px; }
.tb-logo { width: 28px; height: 28px; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: var(--green); flex-shrink: 0; }
.tb-title { font-weight: 700; font-size: 14px; }
.tb-sub { font-size: 10px; opacity: 0.7; }
.tb-right { display: flex; align-items: center; gap: 8px; }
.sync-indicator { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.8); white-space: nowrap; }
.sync-indicator.syncing { border-color: #ffd54f; color: #ffd54f; }

/* LAYOUT */
.wrap { display: flex; min-height: calc(100vh - 50px); }

/* SIDEBAR */
.sidebar { width: 200px; background: white; border-right: 1px solid #cde0d4; padding: 10px 0; position: sticky; top: 50px; height: calc(100vh - 50px); overflow-y: auto; flex-shrink: 0; }
.sb-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; color: var(--gray-500); text-transform: uppercase; padding: 10px 13px 3px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 13px; cursor: pointer; border-left: 3px solid transparent; font-size: 12.5px; color: var(--gray-700); transition: all 0.12s; position: relative; }
.nav-item:hover { background: var(--green-xlight); color: var(--green); }
.nav-item.active { background: var(--green-light); color: var(--green); border-left-color: var(--green); font-weight: 700; }
.nav-icon { width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
.nav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); position: absolute; right: 11px; }
.divider { height: 1px; background: #ddeee3; margin: 8px 12px; }

/* MAIN */
.main { flex: 1; padding: 18px 20px; }

/* PAGE HEADER */
.page-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
.page-hd h2 { font-size: 19px; font-weight: 700; color: var(--green); }
.page-hd p { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.page-actions { display: flex; gap: 7px; flex-wrap: wrap; flex-shrink: 0; }

/* BUTTONS */
.btn { padding: 7px 14px; border-radius: 6px; font-size: 12.5px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { background: #13472a; }
.btn-outline { background: white; color: var(--gray-700); border: 1px solid var(--gray-300); }
.btn-outline:hover { border-color: var(--green); color: var(--green); }
.btn-print { background: #e8f0fb; color: var(--blue); border: 1px solid #b3c6e8; }
.btn-amber { background: #fff3e0; color: var(--amber); border: 1px solid #f0c98a; }
.btn-danger { background: #ffebee; color: var(--red); border: 1px solid #f5c0c0; }
.btn-sm { padding: 5px 10px; font-size: 11.5px; }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.stat { background: white; border: 1px solid #cde0d4; border-radius: 8px; padding: 12px 14px; box-shadow: var(--shadow); }
.stat-lbl { font-size: 10px; color: var(--gray-500); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-val { font-size: 22px; font-weight: 700; color: var(--green); margin-top: 3px; }

/* HISTORY */
.hist-list { display: flex; flex-direction: column; gap: 8px; }
.hitem { background: white; border: 1px solid #cde0d4; border-radius: 8px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.12s; }
.hitem:hover { border-color: var(--green-mid); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(26,92,54,0.1); }
.hitem-meta { font-size: 11px; color: var(--gray-500); margin-top: 3px; }
.badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }

/* EMPTY */
.empty { text-align: center; padding: 50px 20px; color: var(--gray-500); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty h3 { font-size: 15px; font-weight: 700; color: var(--gray-700); margin-bottom: 5px; }

/* RPH CARD */
.rph-card { background: white; border-radius: var(--radius); border: 1px solid #cde0d4; box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; }

/* School header */
.sch-hd { text-align: center; padding: 14px 16px 10px; border-bottom: 2px solid var(--green); }
.sch-name { font-size: 15px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.03em; outline: none; }
.sch-name:focus { background: var(--green-xlight); border-radius: 4px; }
.sch-addr { font-size: 12px; color: var(--gray-700); margin-top: 2px; outline: none; }
.sch-addr:focus { background: var(--green-xlight); border-radius: 4px; }
.sch-doc { font-size: 13.5px; font-weight: 700; margin-top: 6px; letter-spacing: 0.04em; color: var(--gray-900); }

/* Info grid */
.info-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 2fr 2fr; border-bottom: 1.5px solid var(--border); }
.ig-cell { padding: 7px 10px; border-right: 1.5px solid var(--border); }
.ig-cell:last-child { border-right: none; }
.ig-cell label { display: block; font-size: 10px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
.ig-cell input, .ig-cell select { width: 100%; padding: 4px 7px; border: 1px solid #cad8cf; border-radius: 5px; font-size: 12.5px; font-family: inherit; background: #fafdfc; outline: none; }
.ig-cell input:focus, .ig-cell select:focus { border-color: var(--green-mid); background: white; }

/* RPH table */
table.t { width: 100%; min-width: 1100px; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
table.t th, table.t td { border: 1.5px solid var(--border); padding: 7px 9px; vertical-align: top; }
table.t thead th { background: var(--green); color: white; font-size: 10.5px; font-weight: 700; text-align: center; text-transform: uppercase; letter-spacing: 0.04em; white-space: normal; word-wrap: break-word; padding: 8px 6px; line-height: 1.3; }
.tlbl { background: var(--green-light); font-weight: 700; color: var(--green); text-align: center; vertical-align: middle; min-width: 80px; }
.tlbl .tm { font-size: 12px; font-weight: 700; line-height: 1.3; }
.tlbl .bd { font-size: 9.5px; font-weight: 700; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.03em; }
.tlbl input.bd-edit { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; color: var(--green); padding: 1px 3px; border: none; background: transparent; text-align: center; width: 100%; outline: none; }
.tlbl input.bd-edit:focus { background: white; border-radius: 3px; }
.tlbl .dur { font-size: 9px; color: #888; margin-top: 2px; }
table.t textarea { width: 100%; padding: 5px 6px; border: 1px solid #cad8cf; border-radius: 5px; font-size: 11.5px; font-family: inherit; background: #fafdfc; outline: none; resize: vertical; line-height: 1.5; }
table.t textarea:focus { border-color: var(--green-mid); background: white; }

/* Impak + TP */
.impak-wrap { display: flex; flex-direction: column; gap: 3px; }
.ck-item { display: flex; align-items: center; gap: 5px; font-size: 11px; cursor: pointer; color: var(--gray-700); }
.ck-item input[type=checkbox] { width: 13px; height: 13px; accent-color: var(--green); flex-shrink: 0; margin: 0; }
.tp-sec { margin-top: 6px; padding-top: 5px; border-top: 1px dashed #cde0d4; }
.tp-lbl { font-size: 9.5px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }

/* Pentaksiran */
.pent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
.pent-item { background: var(--green-xlight); border: 1px solid #b8d9c5; border-radius: 5px; padding: 5px 8px; display: flex; align-items: center; gap: 5px; font-size: 11.5px; cursor: pointer; }
.pent-item input[type=checkbox] { width: 13px; height: 13px; accent-color: var(--green); flex-shrink: 0; margin: 0; }

/* Rutin row */
.rutin-row td { background: #f8fcfa; }
.rutin-extra { display: flex; gap: 16px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.rutin-extra label { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
.rutin-extra input { padding: 4px 7px; border: 1px solid #cad8cf; border-radius: 5px; font-size: 12px; font-family: inherit; background: #fafdfc; outline: none; }
.rutin-extra input:focus { border-color: var(--green-mid); background: white; }

/* Sync banner */
.sync-banner { padding: 7px 16px; font-size: 11px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid; }
.sync-banner.ok  { background: var(--green-xlight); border-color: #b8d9c5; color: var(--green); }
.sync-banner.warn { background: #fff8f0; border-color: #f0c98a; color: var(--amber); }

/* Toast */
.toast { position: fixed; bottom: 22px; right: 22px; background: var(--green); color: white; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; box-shadow: 0 6px 20px rgba(0,0,0,0.15); opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; z-index: 999; max-width: 320px; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.err { background: var(--red); }
.toast.warn { background: var(--amber); }

/* Print */
@media print {
  body { background: white; font-size: 11px; }
  .topbar, .sidebar, .page-actions, .btn-row-bottom, .no-print { display: none !important; }
  .wrap { display: block; }
  .main { padding: 0; max-width: 100%; }
  .rph-card { box-shadow: none; border: 1px solid #aaa; page-break-inside: avoid; }
  table.t thead th { background: #333 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .tlbl { background: #eee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  table.t textarea { border: none; background: transparent; resize: none; }
  .sch-hd { border-bottom: 2px solid #333; }
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .stats { grid-template-columns: 1fr 1fr; }
  .info-grid { grid-template-columns: 1fr 1fr 1fr; }
  .pent-grid { grid-template-columns: 1fr 1fr; }
}

@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.syncing { animation: pulse 1.5s infinite; }

/* IMAGE UPLOAD */
.btn-img-upload { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 5px; background: #e8f5ee; border: 1px dashed #8dc9a5; color: var(--green); font-size: 11.5px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.btn-img-upload:hover { background: var(--green-light); border-color: var(--green); }
.img-thumbs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.img-thumb-wrap { position: relative; display: inline-block; }
.img-thumb { width: 90px; height: 70px; object-fit: cover; border-radius: 5px; border: 1.5px solid #b8d9c5; cursor: zoom-in; display: block; transition: transform 0.15s; }
.img-thumb:hover { transform: scale(1.04); border-color: var(--green); }
.img-rm { position: absolute; top: -5px; right: -5px; width: 18px; height: 18px; border-radius: 50%; background: var(--red); color: white; border: none; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; }
.img-rm:hover { background: #8b0000; }
@media print {
  .img-thumb { width: 120px; height: 95px; }
  .img-rm { display: none !important; }
  .btn-img-upload { display: none !important; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-brand">
    <div class="tb-logo">e</div>
    <div>
      <div class="tb-title">e-RPH Prasekolah</div>
      <div class="tb-sub">SK Pulau Sebang — Prasekolah Kasih Sayang</div>
    </div>
  </div>
  <div class="tb-right">
    <span style="font-size:11px;opacity:.7;" id="today-lbl"></span>
    <span class="sync-indicator" id="sync-ind">☁️ Memuatkan...</span>
  </div>
</div>

<div class="wrap">
  <aside class="sidebar">
    <div class="sb-label">Menu</div>
    <div class="nav-item" id="nav-dashboard" onclick="go('dashboard')">
      <div class="nav-icon" style="background:#e8f5ee;">📊</div> Dashboard
    </div>
    <div class="nav-item" id="nav-history" onclick="go('history')">
      <div class="nav-icon" style="background:#e8f0fe;">📋</div> Semua RPH
    </div>
    <div class="divider"></div>
    <div class="sb-label">Hari</div>
    <div id="day-nav"></div>
  </aside>
  <main class="main" id="main"></main>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  ⚙️  TETAPAN — TUKAR URL GAS DI SINI SAHAJA
// ══════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzNYsBGkl6nBJVhuRHzEaTG8XAhwRZ-jU4Md5vFEfdxVYX66hRATlYeQbTUHJfA335YGQ/exec';
// Contoh:
// const GAS_URL = 'https://script.google.com/macros/s/AKfycbxXXXXXXXXX/exec';
// ══════════════════════════════════════════════════════

const DAYS = [
  { id:'isnin',  label:'Isnin',  emoji:'1️⃣' },
  { id:'selasa', label:'Selasa', emoji:'2️⃣' },
  { id:'rabu',   label:'Rabu',   emoji:'3️⃣' },
  { id:'khamis', label:'Khamis', emoji:'4️⃣' },
  { id:'jumaat', label:'Jumaat', emoji:'5️⃣' }
];

const SLOTS = [
  { id:'s1', masa:'8.00 - 8.20',   dur:'20 MIN', bidang:'PERBUALAN AWAL',    kompetensi:'Perkembangan Diri',  defAkt:'Guru bersoal jawab dengan murid tentang apa itu keperluan dan kehendak.\n- Keperluan ialah sesuatu yang diperlukan dan mesti dipenuhi\n- Kehendak ialah sesuatu yang ingin dimiliki\n- Murid menonton video pembelajaran perbezaan antara keperluan dan kehendak\n- Contoh keperluan yang mesti dipenuhi ialah makanan, tempat tinggal, pakaian, kasut, buku dan alat tulis\n- Contoh kehendak yang ingin kanak-kanak miliki ialah telefon bimbit, permainan, kasut roda, aiskrim dan makanan ringan' },
  { id:'s2', masa:'8.20 - 8.50',   dur:'30 MIN', bidang:'PERKEMBANGAN DIRI', kompetensi:'Perkembangan Diri',  defAkt:'' },
  { id:'s3', masa:'9.00 - 9.30',   dur:'30 MIN', bidang:'REHAT AKTIF',       kompetensi:'Kemahiran Fizikal',  defAkt:'Murid berjalan di atas garisan lurus menggunakan wisel dan Music' },
  { id:'s4', masa:'9.30 - 10.00',  dur:'30 MIN', bidang:'KEMAHIRAN ASAS',    kompetensi:'Kemahiran Berfikir', defAkt:'' },
  { id:'s5', masa:'10.00 - 10.30', dur:'30 MIN', bidang:'KEMAHIRAN ASAS 2',  kompetensi:'Kemahiran Berfikir', defAkt:'' },
  { id:'s6', masa:'10.30 - 11.00', dur:'30 MIN', bidang:'SAINS AWAL',        kompetensi:'Kemahiran Berfikir', defAkt:'Guru memberikan contoh benda bukan hidup ciptaan manusia seperti jam, cawan, kereta, telefon, kapal terbang.\n- Kemudian guru menerangkan ciri-ciri benda bukan hidup:\n1. Tidak bernafas\n2. Tidak makan dan minum\n3. Tidak membesar\n4. Tidak bergerak dengan sendiri\n- Seterusnya murid mengelaskan objek benda hidup dan benda bukan hidup pada carta pengelasan.' },
  { id:'s7', masa:'11.00 - 11.20', dur:'20 MIN', bidang:'MATEMATIK AWAL',    kompetensi:'Kemahiran Berfikir', defAkt:'Murid dikehendaki membilang nombor 1-20 dalam kumpulan kecil menggunakan alat pembilang seperti cube, cotton bud dan blok kayu\n- Murid dikehendaki mengecam nombor 11-20 secara kelas dengan mencari nombor 11-20\n- Murid dapat membezakan nombor 11 dengan 12, 13 dengan 14\n- Kemudian murid dikehendaki menulis nombor 11-14 dengan betul pada lembaran kerja yang diberikan.' },
  { id:'s8', masa:'11.20 - 11.50', dur:'30 MIN', bidang:'BAHASA MELAYU',     kompetensi:'Kemahiran Bahasa',   defAkt:'' },
];

const PENUTUP_DEF = 'Guru bersoal jawab dengan murid mengenai pembelajaran hari ini.\nGuru membuat rumusan keseluruhan mengenai aktiviti PdPc yang telah dijalankan.\nMurid berbaris dan mengucapkan ucapan selamat pulang serta membaca doa untuk pulang.\nMurid bersalaman dengan guru dan pembantu pengurusan murid.';
const RUTIN_DEF   = 'Ucap salam, minum pagi, pemeriksaan diri dan kebersihan, membaca doa, kalender dan kehadiran murid. Bersalam/mengucapkan selamat antara guru dan PPM dengan murid. Menyusun kasut di rak yang disediakan.';
const PENTAKSIRAN_OPT = ['Lisan','Pemerhatian','Hasil Kerja','Buku Kerja','Projek','Modul Bacaan','Tingkah Laku','Lembaran Kerja','Gabungan'];
const IMPAK_OPT = ['Mencapai objektif','Memerlukan bimbingan','Pemulihan','Pengayaan'];
const TP_OPT = ['TP 1','TP 2','TP 3'];

let rphData = {};
let view    = 'dashboard';
const gasReady = GAS_URL && GAS_URL !== 'MASUKKAN_URL_GAS_DI_SINI';

// ════ INIT ════
async function init() {
  try {
    const d = localStorage.getItem('erph_psk_v3');
    if (d) rphData = JSON.parse(d);
  } catch(e) {}
  setTodayLabel();
  renderDayNav();
  renderDashboard();
  if (gasReady) {
    setSyncInd('loading');
    await loadAllFromGAS();
  } else {
    setSyncInd('nogас');
  }
}

function persist() { localStorage.setItem('erph_psk_v3', JSON.stringify(rphData)); }

function setTodayLabel() {
  const d   = new Date();
  const dys = ['Ahad','Isnin','Selasa','Rabu','Khamis','Jumaat','Sabtu'];
  const mon = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogos','Sep','Okt','Nov','Dis'];
  document.getElementById('today-lbl').textContent = dys[d.getDay()] + ', ' + d.getDate() + ' ' + mon[d.getMonth()] + ' ' + d.getFullYear();
}

function setSyncInd(state) {
  const el = document.getElementById('sync-ind');
  if (!el) return;
  if (state === 'loading') { el.className = 'sync-indicator syncing'; el.textContent = '☁️ Memuatkan...'; }
  else if (state === 'ok')  { el.className = 'sync-indicator'; el.textContent = '✅ Sheets Tersambung'; }
  else if (state === 'sync'){ el.className = 'sync-indicator syncing'; el.textContent = '⏫ Menyimpan...'; }
  else if (state === 'err') { el.className = 'sync-indicator'; el.style.color='#ff8a65'; el.textContent = '⚠️ GAS Gagal'; }
  else                      { el.className = 'sync-indicator'; el.textContent = '💾 Simpan Tempatan'; }
}

// ════ TOAST ════
let _tt;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('show'); }, 3500);
}

// ════ NAV ════
function renderDayNav() {
  document.getElementById('day-nav').innerHTML = DAYS.map(function(d) {
    const saved = rphData[d.id] && rphData[d.id]._saved;
    return '<div class="nav-item ' + (view===d.id?'active':'') + '" id="nav-' + d.id + '" onclick="go(\'' + d.id + '\')">' +
      '<div class="nav-icon" style="background:#e8f5ee;">' + d.emoji + '</div>' +
      '<span style="flex:1;">' + d.label + '</span>' +
      (saved ? '<div class="nav-dot"></div>' : '') +
      '</div>';
  }).join('');
  ['dashboard','history'].forEach(function(v) {
    const el = document.getElementById('nav-'+v);
    if (el) el.classList.toggle('active', view===v);
  });
}

function go(v) {
  view = v;
  renderDayNav();
  if (v === 'dashboard') renderDashboard();
  else if (v === 'history') renderHistory();
  else renderRPH(v);
}

// ════ DASHBOARD ════
function renderDashboard() {
  const m = document.getElementById('main');
  const saved = DAYS.filter(function(d){ return rphData[d.id] && rphData[d.id]._saved; }).length;

  const syncBanner = gasReady

function getLastSaved() {
  var latest = null;
  Object.values(rphData).forEach(function(d) {
    if (d._saved) { var t = new Date(d._saved); if (!latest||t>latest) latest=t; }
  });
  return latest ? latest.toLocaleDateString('ms-MY',{day:'2-digit',month:'short'}) : '—';
}

function exportCSV() {
  const rows = [['Hari','Minggu','Tarikh','Nama Guru','Tema','Strategi','Disimpan']];
  Object.entries(rphData).forEach(function(e) {
    if (!e[1]._saved) return;
    const day = DAYS.find(function(x){ return x.id===e[0]; });
    rows.push([day.label,e[1].minggu||'',e[1].tarikh||'',e[1].guru||'',e[1].tema||'',e[1].strategi||'',e[1]._saved]);
  });
  const csv = rows.map(function(r){ return r.map(function(c){ return '"'+(c||'').replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  const a = document.createElement('a'); a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv); a.download='e-RPH-export.csv'; a.click();
  toast('✅ CSV berjaya dieksport!');
}

// ── IMAGE HELPERS ──
function addImages(dayId, slotId, input) {
  const files = Array.from(input.files);
  if (!rphData[dayId]) rphData[dayId] = {};
  if (!rphData[dayId][slotId]) rphData[dayId][slotId] = {};
  if (!rphData[dayId][slotId].images) rphData[dayId][slotId].images = [];
  var done = 0;
  files.forEach(function(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      rphData[dayId][slotId].images.push(e.target.result);
      done++;
      if (done === files.length) {
        persist();
        refreshThumbs(dayId, slotId);
        toast('✅ ' + files.length + ' gambar ditambah!');
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function removeImg(dayId, slotId, idx) {
  if (!confirm('Buang gambar ini?')) return;
  rphData[dayId][slotId].images.splice(idx, 1);
  persist();
  refreshThumbs(dayId, slotId);
}

function refreshThumbs(dayId, slotId) {
  const el = document.getElementById('thumbs-'+slotId);
  if (!el) return;
  const imgs = (rphData[dayId] && rphData[dayId][slotId] && rphData[dayId][slotId].images) || [];
  el.innerHTML = imgs.map(function(src,i){
    return '<div class="img-thumb-wrap">' +
      '<img src="'+src+'" class="img-thumb" onclick="viewImg(\''+slotId+'\','+i+')">' +
      '<button class="img-rm no-print" onclick="removeImg(\''+dayId+'\',\''+slotId+'\','+i+')">✕</button>' +
    '</div>';
  }).join('');
}

// Lightbox
function viewImg(slotId, idx) {
  const imgs = document.querySelectorAll('#thumbs-'+slotId+' .img-thumb');
  if (!imgs[idx]) return;
  const src = imgs[idx].src;
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
  ov.innerHTML = '<img src="'+src+'" style="max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.5);">';
  ov.onclick = function(){ document.body.removeChild(ov); };
  document.body.appendChild(ov);
}

// ════ COLLECT ════
function collectRPH(dayId) {
  const d = {};
  const sn=document.getElementById('sch-name'); if(sn) d.sekolah=sn.textContent;
  const sa=document.getElementById('sch-addr'); if(sa) d.alamat=sa.textContent;
  const sk=document.getElementById('sch-kelas'); if(sk) d.kelas=sk.textContent;
  ['guru','minggu','hari','tarikh','tema','strategi','rutin','hadir','peristiwa','penutup','refleksi'].forEach(function(f){
    const el=document.getElementById('f_'+f); if(el) d[f]=el.value;
  });
  d.pentaksiran = Array.from(document.querySelectorAll('input[name="pent"]:checked')).map(function(cb){ return cb.value; });
  SLOTS.forEach(function(s) {
    d[s.id] = {};
    document.querySelectorAll('[data-slot="'+s.id+'"][data-field]').forEach(function(el){ d[s.id][el.dataset.field]=el.value||el.textContent; });
    d[s.id].impak = Array.from(document.querySelectorAll('input[data-slot="'+s.id+'"][data-impak]:checked')).map(function(cb){ return cb.dataset.impak; });
    d[s.id].tp    = Array.from(document.querySelectorAll('input[data-slot="'+s.id+'"][data-tp]:checked')).map(function(cb){ return cb.dataset.tp; });
    // Kekalkan gambar yang sudah di-upload
    const existing = rphData[dayId] && rphData[dayId][s.id] && rphData[dayId][s.id].images;
    if (existing && existing.length) d[s.id].images = existing;
  });
  return d;
}

// ════ SAVE — simpan tempatan + auto-sync ke GAS ════
async function saveRPH(dayId) {
  const d = collectRPH(dayId);
  d._saved = new Date().toISOString();
  d._lbl   = new Date().toLocaleDateString('ms-MY',{day:'2-digit',month:'short'});
  rphData[dayId] = d;
  persist();
  renderDayNav();
  toast('✅ RPH Hari ' + DAYS.find(function(x){ return x.id===dayId; }).label + ' disimpan!');
  if (gasReady) await pushToGAS(dayId, d);
}

function clearRPH(dayId) {
  if (!confirm('Kosongkan semua data RPH hari ini?')) return;
  delete rphData[dayId]; persist(); renderDayNav(); renderRPH(dayId);
  toast('Borang dikosongkan.','warn');
}

// ════ GAS — PUSH (POST) — auto dipanggil semasa save ════
async function pushToGAS(dayId, d) {
  const payload = Object.assign({}, d, { _dayId: dayId, _dayLabel: DAYS.find(function(x){ return x.id===dayId; }).label, _action:'save' });
  setSyncInd('sync');
  try {
    await fetch(GAS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    setSyncInd('ok');
  } catch(e) {
    setSyncInd('err');
    console.warn('GAS push failed:', e.message);
  }
}

// ════ GAS — LOAD (GET) — dipanggil masa init ════
async function loadAllFromGAS() {
  if (!gasReady) return;
  setSyncInd('loading');
  try {
    const res = await fetch(GAS_URL + '?action=load');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && typeof data === 'object') {
      Object.entries(data).forEach(function(e) {
        const dayId=e[0]; const remote=e[1];
        const local=rphData[dayId];
        const tR = remote._saved ? new Date(remote._saved) : new Date(0);
        const tL = local&&local._saved ? new Date(local._saved) : new Date(0);
        if (tR >= tL) rphData[dayId] = remote;
      });
      persist();
      renderDayNav();
      if (view==='dashboard') renderDashboard();
      else if (view==='history') renderHistory();
      else if (DAYS.find(function(d){ return d.id===view; })) renderRPH(view);
      toast('✅ Data dimuatkan dari Google Sheets!');
    }
    setSyncInd('ok');
  } catch(e) {
    console.warn('GAS load failed:', e.message);
    setSyncInd('err');
  }
}

init();
</script>
</body>
</html>
